<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gold Macro Trend Model Premium Cover</title>
  <desc id="desc">Premium minimal cover with performance chart and three key metrics.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f16"/>
      <stop offset="55%" stop-color="#111a27"/>
      <stop offset="100%" stop-color="#18283d"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7d78f"/>
      <stop offset="100%" stop-color="#c8912f"/>
    </linearGradient>

    <linearGradient id="model" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#90edd8"/>
      <stop offset="100%" stop-color="#34bda9"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1420" cy="120" r="250" fill="#f7d78f" opacity="0.08"/>

  <text x="90" y="115" fill="#f3f7fb" font-size="74" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Gold Macro Trend Model</text>
  <text x="90" y="160" fill="#a9bbcf" font-size="28" font-family="Georgia, 'Times New Roman', serif">Out-of-sample performance summary</text>

  <g transform="translate(90,210)" filter="url(#shadow)">
    <rect x="0" y="0" width="1420" height="460" rx="28" ry="28" fill="#0c1521" fill-opacity="0.86" stroke="#ffffff" stroke-opacity="0.14"/>

    <line x1="100" y1="370" x2="1320" y2="370" stroke="#6f839a" stroke-opacity="0.5" stroke-width="2"/>
    <line x1="100" y1="305" x2="1320" y2="305" stroke="#6f839a" stroke-opacity="0.3" stroke-width="1.3"/>
    <line x1="100" y1="240" x2="1320" y2="240" stroke="#6f839a" stroke-opacity="0.3" stroke-width="1.3"/>
    <line x1="100" y1="175" x2="1320" y2="175" stroke="#6f839a" stroke-opacity="0.3" stroke-width="1.3"/>

    <polyline fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
      points="100,366 236,343 372,352 507,302 643,292 778,308 914,290 1049,272 1185,202 1320,58"/>

    <polyline fill="none" stroke="url(#model)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"
      points="100,362 236,340 372,346 507,325 643,320 778,313 914,306 1049,292 1185,251 1320,219"/>

    <g fill="#9bb0c5" font-size="17" font-family="Georgia, 'Times New Roman', serif">
      <text x="88" y="406">2016</text>
      <text x="224" y="406">2017</text>
      <text x="360" y="406">2018</text>
      <text x="495" y="406">2019</text>
      <text x="631" y="406">2020</text>
      <text x="766" y="406">2021</text>
      <text x="902" y="406">2022</text>
      <text x="1037" y="406">2023</text>
      <text x="1173" y="406">2024</text>
      <text x="1308" y="406">2025</text>
    </g>

    <g transform="translate(110,42)">
      <rect x="0" y="0" width="15" height="15" rx="8" ry="8" fill="url(#gold)"/>
      <text x="24" y="13" fill="#f3f7fb" font-size="24" font-family="Georgia, 'Times New Roman', serif">Passive Gold</text>

      <rect x="275" y="0" width="15" height="15" rx="8" ry="8" fill="url(#model)"/>
      <text x="299" y="13" fill="#f3f7fb" font-size="24" font-family="Georgia, 'Times New Roman', serif">Model 20-80%</text>
    </g>
  </g>

  <g transform="translate(90,735)">
    <text x="0" y="0" fill="#f5d68d" font-size="56" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Sharpe 0.983</text>
    <text x="500" y="0" fill="#ffb5a4" font-size="56" font-weight="700" font-family="Georgia, 'Times New Roman', serif">MaxDD -9.59%</text>
    <text x="1030" y="0" fill="#9fe8d7" font-size="56" font-weight="700" font-family="Georgia, 'Times New Roman', serif">AUC 0.550</text>
  </g>
</svg>
