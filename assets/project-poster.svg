<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gold Macro Trend Model Poster</title>
  <desc id="desc">Visual summary of the Gold Macro Trend Model project, methodology and key out-of-sample results.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1726"/>
      <stop offset="55%" stop-color="#10233a"/>
      <stop offset="100%" stop-color="#18304b"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c78b2f"/>
      <stop offset="55%" stop-color="#f0c66d"/>
      <stop offset="100%" stop-color="#ffd98e"/>
    </linearGradient>

    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1400" cy="170" r="260" fill="#d9a54d" opacity="0.09"/>
  <circle cx="180" cy="780" r="280" fill="#8fb8d8" opacity="0.08"/>

  <rect x="70" y="60" rx="24" ry="24" width="1460" height="780" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.22"/>

  <text x="120" y="150" fill="#d8e8f7" font-size="30" font-family="Georgia, 'Times New Roman', serif" letter-spacing="2">MACHINE LEARNING FOR MACRO ALLOCATION</text>
  <text x="120" y="225" fill="url(#gold)" font-size="74" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Gold Macro Trend Model</text>
  <text x="120" y="275" fill="#d8e8f7" font-size="31" font-family="Georgia, 'Times New Roman', serif">From macro signals to calibrated gold exposure</text>

  <rect x="120" y="325" width="640" height="5" fill="url(#gold)" opacity="0.9"/>

  <g transform="translate(120,370)">
    <text x="0" y="0" fill="#f6d188" font-size="29" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Pipeline Snapshot</text>
    <text x="0" y="52" fill="#e9f1f8" font-size="27" font-family="Georgia, 'Times New Roman', serif">Data Sources:</text>
    <text x="210" y="52" fill="#c8dced" font-size="27" font-family="Georgia, 'Times New Roman', serif">FRED, Yahoo Finance, WGC, COT</text>

    <text x="0" y="98" fill="#e9f1f8" font-size="27" font-family="Georgia, 'Times New Roman', serif">Features:</text>
    <text x="210" y="98" fill="#c8dced" font-size="27" font-family="Georgia, 'Times New Roman', serif">353 raw -> 67 selected across 9 groups</text>

    <text x="0" y="144" fill="#e9f1f8" font-size="27" font-family="Georgia, 'Times New Roman', serif">Model:</text>
    <text x="210" y="144" fill="#c8dced" font-size="27" font-family="Georgia, 'Times New Roman', serif">LightGBM, 10-fold expanding walk-forward</text>

    <text x="0" y="190" fill="#e9f1f8" font-size="27" font-family="Georgia, 'Times New Roman', serif">Calibration:</text>
    <text x="210" y="190" fill="#c8dced" font-size="27" font-family="Georgia, 'Times New Roman', serif">Platt scaling, ECE 0.009 to 0.032</text>

    <text x="0" y="236" fill="#e9f1f8" font-size="27" font-family="Georgia, 'Times New Roman', serif">Output:</text>
    <text x="210" y="236" fill="#c8dced" font-size="27" font-family="Georgia, 'Times New Roman', serif">Score 0 to 100 -> allocation slider 20% to 80%</text>
  </g>

  <g transform="translate(900,360)">
    <rect x="0" y="0" width="520" height="360" rx="22" ry="22" fill="#081321" fill-opacity="0.58" stroke="#f0c66d" stroke-opacity="0.45"/>
    <text x="34" y="54" fill="#f6d188" font-size="34" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Out-of-Sample Evidence</text>

    <text x="34" y="108" fill="#dceaf6" font-size="28" font-family="Georgia, 'Times New Roman', serif">2016 to 2025 (516 weekly observations)</text>

    <text x="34" y="170" fill="#8fd6a8" font-size="55" font-weight="700" font-family="Georgia, 'Times New Roman', serif" filter="url(#softGlow)">Sharpe 0.983</text>
    <text x="34" y="220" fill="#dceaf6" font-size="30" font-family="Georgia, 'Times New Roman', serif">Strategy E: floor allocation 20 to 80%</text>

    <text x="34" y="278" fill="#ffb0a0" font-size="48" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Max Drawdown -9.59%</text>

    <text x="34" y="330" fill="#dceaf6" font-size="28" font-family="Georgia, 'Times New Roman', serif">Global pooled OOS AUC: 0.550</text>
  </g>

  <g transform="translate(120,770)">
    <text x="0" y="0" fill="#f6d188" font-size="25" font-family="Georgia, 'Times New Roman', serif">Designed for allocation decisions, not short-term trading timing.</text>
    <text x="0" y="42" fill="#c2d8eb" font-size="22" font-family="Georgia, 'Times New Roman', serif">Repository: github.com/lucaneviani/gold-macro-trend-model</text>
  </g>
</svg>
