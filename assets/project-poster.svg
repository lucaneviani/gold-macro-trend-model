<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Gold Macro Trend Model Cover</title>
  <desc id="desc">Minimal designer cover with performance chart comparing passive gold and model strategy from 2016 to 2025.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1118"/>
      <stop offset="60%" stop-color="#141e2b"/>
      <stop offset="100%" stop-color="#1d2d43"/>
    </linearGradient>

    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9d27a"/>
      <stop offset="100%" stop-color="#c68f2b"/>
    </linearGradient>

    <linearGradient id="modelLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#76e1c9"/>
      <stop offset="100%" stop-color="#2fb8a7"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <circle cx="1330" cy="150" r="220" fill="#f0be62" opacity="0.08"/>
  <circle cx="180" cy="840" r="260" fill="#77d9c2" opacity="0.07"/>

  <g transform="translate(90,70)">
    <text x="0" y="0" fill="#f2f6fb" font-size="72" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Gold Macro Trend Model</text>
    <text x="0" y="50" fill="#b9c7d8" font-size="28" font-family="Georgia, 'Times New Roman', serif">Performance cover • Out-of-sample 2016-2025</text>
  </g>

  <g transform="translate(80,180)" filter="url(#softShadow)">
    <rect x="0" y="0" width="1440" height="560" rx="24" ry="24" fill="#0d1623" fill-opacity="0.82" stroke="#ffffff" stroke-opacity="0.16"/>

    <line x1="120" y1="460" x2="1320" y2="460" stroke="#73859b" stroke-opacity="0.55" stroke-width="2"/>
    <line x1="120" y1="390" x2="1320" y2="390" stroke="#73859b" stroke-opacity="0.35" stroke-width="1.4"/>
    <line x1="120" y1="320" x2="1320" y2="320" stroke="#73859b" stroke-opacity="0.35" stroke-width="1.4"/>
    <line x1="120" y1="250" x2="1320" y2="250" stroke="#73859b" stroke-opacity="0.35" stroke-width="1.4"/>
    <line x1="120" y1="180" x2="1320" y2="180" stroke="#73859b" stroke-opacity="0.35" stroke-width="1.4"/>

    <text x="62" y="467" fill="#9ab0c6" font-size="20" font-family="Georgia, 'Times New Roman', serif">100</text>
    <text x="62" y="397" fill="#9ab0c6" font-size="20" font-family="Georgia, 'Times New Roman', serif">150</text>
    <text x="62" y="327" fill="#9ab0c6" font-size="20" font-family="Georgia, 'Times New Roman', serif">200</text>
    <text x="62" y="257" fill="#9ab0c6" font-size="20" font-family="Georgia, 'Times New Roman', serif">250</text>
    <text x="62" y="187" fill="#9ab0c6" font-size="20" font-family="Georgia, 'Times New Roman', serif">300</text>

    <polyline fill="none" stroke="url(#goldLine)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
      points="120,456 253,432 386,442 520,392 653,382 786,398 920,380 1053,362 1186,292 1320,148"/>

    <polyline fill="none" stroke="url(#modelLine)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
      points="120,452 253,429 386,435 520,414 653,410 786,402 920,395 1053,380 1186,338 1320,306"/>

    <g fill="#9ab0c6" font-size="18" font-family="Georgia, 'Times New Roman', serif">
      <text x="108" y="500">2016</text>
      <text x="241" y="500">2017</text>
      <text x="374" y="500">2018</text>
      <text x="508" y="500">2019</text>
      <text x="641" y="500">2020</text>
      <text x="774" y="500">2021</text>
      <text x="908" y="500">2022</text>
      <text x="1041" y="500">2023</text>
      <text x="1174" y="500">2024</text>
      <text x="1308" y="500">2025</text>
    </g>

    <g transform="translate(130,54)">
      <rect x="0" y="0" width="16" height="16" rx="8" ry="8" fill="url(#goldLine)"/>
      <text x="28" y="14" fill="#f2f6fb" font-size="24" font-family="Georgia, 'Times New Roman', serif">Passive Gold • 284% total return</text>

      <rect x="520" y="0" width="16" height="16" rx="8" ry="8" fill="url(#modelLine)"/>
      <text x="548" y="14" fill="#f2f6fb" font-size="24" font-family="Georgia, 'Times New Roman', serif">Model 20-80% • 101% total return</text>
    </g>
  </g>

  <g transform="translate(90,790)">
    <text x="0" y="0" fill="#d5dfeb" font-size="26" font-family="Georgia, 'Times New Roman', serif">Sharpe 0.983   •   Max Drawdown -9.59%   •   Global OOS AUC 0.550</text>
  </g>
</svg>
